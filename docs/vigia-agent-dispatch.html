<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIGIA — Specialist Agent Parallel Dispatch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #eceef2;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px 24px;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    }

    .frame {
      width: 100%;
      max-width: 900px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 28px rgba(15, 23, 42, 0.07);
      overflow: hidden;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    @media print {
      body { background: white; padding: 0; }
      .frame { box-shadow: none; border-radius: 0; max-width: 100%; }
      svg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <svg viewBox="0 0 900 478" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VIGIA specialist agent parallel dispatch: Ingest node to Admin, Vision, and Telemetry agents converging to corroborated answer">
      <defs>
        <filter id="nodeShadow" x="-6%" y="-8%" width="112%" height="124%">
          <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.07"/>
        </filter>

        <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 1 L 7 4 L 0 7 Z" fill="#94a3b8" stroke="none"/>
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 1 L 7 4 L 0 7 Z" fill="#2563eb" stroke="none"/>
        </marker>

        <linearGradient id="ingestFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#eff6ff"/>
          <stop offset="100%" stop-color="#ffffff"/>
        </linearGradient>
      </defs>

      <!-- Canvas -->
      <rect x="10" y="10" width="880" height="458" rx="12" fill="#fafbfc" stroke="#e5e7eb" stroke-width="1"/>

      <!-- Section label -->
      <text x="450" y="30" font-family="DM Sans, system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="0.1em">INGEST NODE · PARALLEL DISPATCH</text>

      <!-- Ingest node -->
      <g filter="url(#nodeShadow)">
        <rect x="165" y="38" width="570" height="76" rx="8" fill="url(#ingestFill)" stroke="#2563eb" stroke-width="2"/>
        <text x="450" y="62" font-family="DM Sans, system-ui, sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="middle">Ingest Node</text>
        <text x="450" y="80" font-family="DM Sans, system-ui, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">Promise.allSettled · 6s timeout</text>
        <text x="450" y="96" font-family="DM Sans, system-ui, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">Independent AbortController per agent</text>
      </g>

      <!-- Fan-out connectors -->
      <g fill="none" stroke="#cbd5e1" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 450 114 L 450 122"/>
        <path d="M 150 122 L 750 122"/>
        <path d="M 150 122 L 150 130" marker-end="url(#arrowGray)"/>
        <path d="M 450 122 L 450 130" marker-end="url(#arrowGray)"/>
        <path d="M 750 122 L 750 130" marker-end="url(#arrowGray)"/>
      </g>
      <circle cx="450" cy="122" r="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>

      <!-- Admin Agent -->
      <g filter="url(#nodeShadow)">
        <rect x="16" y="130" width="268" height="262" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.25"/>
        <path d="M 16 130 h 268 a 8 8 0 0 1 8 8 v 52 H 16 Z" fill="#f9fafb"/>
        <line x1="16" y1="190" x2="284" y2="190" stroke="#e5e7eb" stroke-width="1"/>
        <text x="28" y="154" font-family="DM Sans, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Admin Agent</text>
        <text x="28" y="172" font-family="DM Sans, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#2563eb">ReWOO Plan-and-Execute · Nova Lite</text>
        <rect x="28" y="200" width="244" height="74" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
        <text x="38" y="216" font-family="DM Sans, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#374151">Retrieval plan (DAG ≤ 4 steps)</text>
        <text x="38" y="232" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#6b7280">Sources + entities · topological execution</text>
        <text x="38" y="248" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#6b7280">Independent steps run in parallel</text>
        <text x="38" y="264" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#6b7280">Upstream results injected downstream</text>
        <rect x="28" y="282" width="244" height="46" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
        <text x="38" y="298" font-family="DM Sans, system-ui, sans-serif" font-size="9" font-weight="600" fill="#1d4ed8">External</text>
        <text x="38" y="314" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#3b82f6">World Bank / OCDS · pgvector · PWD contacts</text>
        <rect x="28" y="336" width="244" height="48" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
        <text x="38" y="354" font-family="DM Sans, system-ui, sans-serif" font-size="9" font-weight="600" fill="#c2410c">CRAG retry</text>
        <text x="38" y="370" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#9a3412">Only Admin re-runs with rewritten query</text>
      </g>

      <!-- Vision Agent -->
      <g filter="url(#nodeShadow)">
        <rect x="316" y="130" width="268" height="262" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.25"/>
        <path d="M 316 130 h 268 a 8 8 0 0 1 8 8 v 52 H 316 Z" fill="#f9fafb"/>
        <line x1="316" y1="190" x2="584" y2="190" stroke="#e5e7eb" stroke-width="1"/>
        <text x="328" y="154" font-family="DM Sans, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Vision Agent</text>
        <text x="328" y="172" font-family="DM Sans, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#2563eb">Multimodal VLM · Nova Lite (vision)</text>
        <rect x="328" y="200" width="244" height="74" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
        <text x="338" y="216" font-family="DM Sans, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#374151">Input: citizen road photo</text>
        <text x="338" y="232" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#6b7280">imageUrl in chat payload</text>
        <text x="338" y="248" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#6b7280">iRAP-standard assessment prompt</text>
        <text x="338" y="264" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#6b7280">No intermediate ReAct reasoning steps</text>
        <rect x="328" y="282" width="244" height="62" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
        <text x="338" y="298" font-family="DM Sans, system-ui, sans-serif" font-size="9" font-weight="600" fill="#166534">Structured output</text>
        <text x="338" y="314" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#15803d">Severity · iRAP star rating (1–5) · observations</text>
        <text x="338" y="330" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#15803d">Trust: citizen-claim · unverified disclosure</text>
        <rect x="328" y="352" width="244" height="32" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
        <text x="338" y="370" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#b91c1c">Guardrail cross-checks vs. maintenance records</text>
      </g>

      <!-- Telemetry Agent -->
      <g filter="url(#nodeShadow)">
        <rect x="616" y="130" width="268" height="262" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.25"/>
        <path d="M 616 130 h 268 a 8 8 0 0 1 8 8 v 52 H 616 Z" fill="#f9fafb"/>
        <line x1="616" y1="190" x2="884" y2="190" stroke="#e5e7eb" stroke-width="1"/>
        <text x="628" y="154" font-family="DM Sans, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Telemetry Agent</text>
        <text x="628" y="172" font-family="DM Sans, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#2563eb">GPS + IMU processing · Rule-based (no LLM)</text>
        <rect x="628" y="200" width="244" height="74" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
        <text x="638" y="216" font-family="DM Sans, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#374151">Location input</text>
        <text x="638" y="232" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#6b7280">Browser geolocation API or regex from query</text>
        <text x="638" y="248" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#6b7280">IMU anomaly payloads · 1.5g vertical threshold</text>
        <text x="638" y="264" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#6b7280">Prototype values demonstrate data model today</text>
        <rect x="628" y="282" width="244" height="46" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
        <text x="638" y="298" font-family="DM Sans, system-ui, sans-serif" font-size="9" font-weight="600" fill="#1d4ed8">External</text>
        <text x="638" y="314" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#3b82f6">OpenStreetMap · Overpass · Gati Shakti tool</text>
        <rect x="628" y="336" width="244" height="48" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
        <text x="638" y="354" font-family="DM Sans, system-ui, sans-serif" font-size="9" font-weight="600" fill="#7e22ce">Road identity</text>
        <text x="638" y="370" font-family="DM Sans, system-ui, sans-serif" font-size="9" fill="#9333ea">Road type · number · state at coordinates</text>
      </g>

      <!-- Converge connectors -->
      <g fill="none" stroke="#cbd5e1" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 150 392 L 150 404"/>
        <path d="M 450 392 L 450 404"/>
        <path d="M 750 392 L 750 404"/>
        <path d="M 150 404 L 750 404"/>
        <path d="M 450 404 L 450 422" marker-end="url(#arrowBlue)"/>
      </g>
      <circle cx="450" cy="404" r="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>

      <!-- Merge output -->
      <g filter="url(#nodeShadow)">
        <rect x="185" y="424" width="530" height="32" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
        <text x="450" y="440" font-family="DM Sans, system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle" dominant-baseline="middle">Merged evidence → Guardrail (CRAG) → corroborated answer</text>
      </g>
    </svg>
  </div>
</body>
</html>
